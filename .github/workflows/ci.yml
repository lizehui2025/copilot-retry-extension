name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package vsix
        run: npm run package

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-retry-proxy-${{ github.sha }}
          path: '*.vsix'
          if-no-files-found: error
          retention-days: 14
